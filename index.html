<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next Experience</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
background:#000;
color:white;
overflow-x:hidden;
}

/* ナビ */

header{
position:fixed;
width:100%;
top:0;
display:flex;
justify-content:space-between;
padding:20px 60px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
z-index:100;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
font-size:14px;
}

/* セクション */

section{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
opacity:0;
transform:translateY(80px);
transition:1s;
}

.show{
opacity:1;
transform:translateY(0);
}

h1{
font-size:70px;
margin-bottom:10px;
}

p{
font-size:22px;
color:#aaa;
}

/* ヒーロー */

.hero{
background:linear-gradient(180deg,#000,#111);
}

/* パララックス */

.parallax{
background:url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee") center/cover;
background-attachment:fixed;
}

/* カード */

.cards{
display:flex;
gap:30px;
margin-top:40px;
}

.card{
width:260px;
padding:30px;
background:#111;
border-radius:20px;
transition:0.4s;
}

.card:hover{
transform:translateY(-15px) scale(1.05);
background:#1c1c1e;
}

/* ボタン */

button{
margin-top:20px;
padding:12px 30px;
border:none;
border-radius:30px;
background:white;
color:black;
cursor:pointer;
font-size:16px;
}

footer{
padding:40px;
text-align:center;
color:#777;
}

</style>

</head>

<body>

<header>

<div>Next</div>

<nav>
<a href="#">Home</a>
<a href="#">Features</a>
<a href="#">Contact</a>
</nav>

</header>

<section class="hero">
<h1>未来を、体験。</h1>
<p>次世代のデザイン</p>
<button>Start</button>
</section>

<section class="parallax">
<h1>美しい体験</h1>
<p>スクロールで世界が変わる</p>
</section>

<section>

<h1>Features</h1>

<div class="cards">

<div class="card">
<h2>Fast</h2>
<p>超高速パフォーマンス</p>
</div>

<div class="card">
<h2>Modern</h2>
<p>最新UIデザイン</p>
</div>

<div class="card">
<h2>Creative</h2>
<p>自由な表現</p>
</div>

</div>

</section>

<footer>
© 2026 Next Experience
</footer>

<script>

const sections=document.querySelectorAll("section")

function reveal(){

const trigger=window.innerHeight*0.85

sections.forEach(section=>{
const top=section.getBoundingClientRect().top

if(top<trigger){
section.classList.add("show")
}

})

}

window.addEventListener("scroll",reveal)
reveal()

</script>

</body>
</html>
