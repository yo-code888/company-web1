<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Site</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#1f1c2c,#928dab);
font-family:Arial;
}

.box{
width:200px;
height:200px;
background:#00e5ff;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
transition:0.5s;
}

.move{
transform:rotate(360deg) scale(1.5);
background:#ff4d6d;
}

</style>
</head>

<body>

<div class="box" onclick="moveBox()">CLICK</div>

<script>

function moveBox(){
const box=document.querySelector(".box")
box.classList.toggle("move")
}

</script>

</body>
</html>
